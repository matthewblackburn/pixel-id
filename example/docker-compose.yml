services:
  api:
    build:
      context: ..
      dockerfile: example/Dockerfile.dev
    ports:
      - "${API_PORT:-4100}:8080"
    volumes:
      - ../go:/workspace/go
      - .:/workspace/example
    working_dir: /workspace/example
    environment:
      - MACHINE_ID=1

  web:
    build:
      context: .
      dockerfile: web/Dockerfile.dev
    ports:
      - "${WEB_PORT:-4200}:4200"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
      - ../ts/src:/ts-src:ro
    depends_on:
      - api

volumes:
  web_node_modules:
